<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#333">墙面设计方案示意图</text>
  
  <!-- Wall A - Main Background (Logo Section) -->
  <rect x="100" y="80" width="420" height="760" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
  <circle cx="320" cy="200" r="90" fill="#2c3e50" stroke="#3498db" stroke-width="4"/>
  <text x="320" y="195" font-family="Microsoft YaHei, 'SimHei', Arial, sans-serif" font-size="28" text-anchor="middle" fill="#fff">翰林光年</text>
  <text x="320" y="245" font-family="Microsoft YaHei, 'SimHei', Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ecf0f1">International Education Consulting
Empowering Global Educational Journeys</text>
  <text x="320" y="275" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#95a5a6">墙面 A (主背景墙)</text>
  
  <!-- LED Lighting -->
  <rect x="90" y="78" width="440" height="20" fill="#f39c12"/>
  <text x="310" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">LED 灯带 (3200K)</text>
  
  <!-- Wall B - Left Side (Case Studies) -->
  <rect x="550" y="80" width="540" height="760" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <text x="820" y="140" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#2c3e50">墙面 B (辅助墙)</text>
  
  <!-- Case Study Cards -->
  <rect x="600" y="170" width="440" height="60" rx="5" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="820" y="195" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f8c8d">留学生成功案例</text>
  
  <!-- School Info Section -->
  <rect x="600" y="250" width="440" height="40" rx="3" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1"/>
  <text x="820" y="275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#16a085">中华书院 (PPCHA)</text>
  
  <!-- Educational Pillars -->
  <rect x="560" y="310" width="520" height="400" fill="#fff"/>
  <text x="820" y="335" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">PROVIDE - PROMOTE</text>
  <text x="820" y="365" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">CULTIVATE - HELP - ACHIEVE</text>
  
  <!-- Wall C - Educational Philosophy -->
  <rect x="100" y="860" width="1000" height="240" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <text x="600" y="910" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#34495e">墙面 C (辅助墙)</text>
  
  <!-- Philosophy Section -->
  <rect x="200" y="940" width="800" height="160" rx="10" fill="#fff"/>
  <text x="600" y="975" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#34495e">教育不是越早出国越好，而是越合适越好</text>
  
  <!-- Three Core Principles -->
  <rect x="250" y="1000" width="280" height="120" rx="5" fill="#e8f6f3"/>
  <text x="490" y="1025" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#16a085">✅ 教育不是越早出国越好</text>
  
  <rect x="550" y="1000" width="280" height="120" rx="5" fill="#e8f6f3"/>
  <text x="790" y="1025" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#16a085">✅ 低龄阶段认知与适应</text>
  
  <rect x="850" y="1000" width="280" height="120" rx="5" fill="#e8f6f3"/>
  <text x="1090" y="1025" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#16a085">✅ 降低试错成本</text>
  
  <!-- Dimensions -->
  <rect x="100" y="1130" width="420" height="20" fill="#95a5a6"/>
  <text x="320" y="1160" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">墙面 A: 72㎡</text>
  
  <rect x="540" y="1130" width="650" height="20" fill="#95a5a6"/>
  <text x="865" y="1160" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">墙面 B: 144㎡ (左：案例 | 右：学校)</text>
  
  <rect x="100" y="1165" width="1000" height="20" fill="#95a5a6"/>
  <text x="600" y="1195" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">墙面 C: 144㎡ (上：理念 | 下：业务)</text>
  
  <!-- Color Legend -->
  <rect x="100" y="1200" width="80" height="30" fill="#2c3e50"/>
  <text x="190" y="1225" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#333">暗色背景</text>
  
  <rect x="200" y="1200" width="80" height="30" fill="#ecf0f1"/>
  <text x="290" y="1225" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#333">案例展示区</text>
  
  <rect x="300" y="1200" width="80" height="30" fill="#e8f6f3"/>
  <text x="390" y="1225" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#333">理念展示区</text>
  
  <!-- Brand Colors -->
  <rect x="410" y="1200" width="30" height="30" fill="#2196f3"/>
  <text x="450" y="1225" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#333">科技蓝 #2196f3</text>
  
  <rect x="460" y="1200" width="30" height="30" fill="#ff9800"/>
  <text x="510" y="1225" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#333">活力橙 #ff9800</text>
  
  <!-- Technical Notes -->
  <rect x="100" y="1250" width="1000" height="100" fill="#f8f9fa" stroke="#dee2e6"/>
  <text x="600" y="1275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">⚠️ 注意事项：</text>
  <text x="600" y="1295" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#7f8c8d">• 墙面 A/B/C 保持视觉连贯性 • 灯光系统统一规划 (色温≤3500K)</text>
  
</svg>
