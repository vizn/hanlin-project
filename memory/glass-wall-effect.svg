<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <!-- Glass Effect Filter -->
    <filter id="glass-effect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feColorMatrix type="matrix" values="0.9 0 0 0 0 
                                            0.9 0 0 0 0 
                                            0.9 0 0 0 0"/>
    </filter>
    
    <!-- Gradient for Glass -->
    <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.8);stop-opacity:1"/>
      <stop offset="50%" style="stop-color:rgba(240,245,255,0.6);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(230,235,250,0.8);stop-opacity:1"/>
    </linearGradient>
    
    <!-- Logo Glow -->
    <filter id="logo-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Background -->
  <rect width="1400" height="1200" fill="#f5f7fa"/>
  
  <!-- Title Section -->
  <text x="60" y="60" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a1a1a">玻璃墙面半透明效果设计</text>
  <line x1="60" y1="95" x2="1340" y2="95" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Technical Notes -->
  <rect x="60" y="110" width="1280" height="70" fill="#fff3e0" rx="8"/>
  <text x="80" y="145" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16" font-weight="bold" fill="#f57c00">玻璃材质处理要点：</text>
  <text x="80" y="168" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#333">• 建议使用双层夹胶钢化玻璃（厚度 8+1.14+8mm）</text>
  <text x="80" y="190" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#333">• Logo/文字采用背发光亚克力板（厚度 20-25mm）</text>
  <text x="80" y="212" font-family="'Microsoft YaHei', Arial, sans-serif" size="14" fill="#333">• 灯光色温 3200K（暖白），照度 150-200lux</text>
  <text x="80" y="235" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#333">• 玻璃表面覆防眩光膜，透光率控制在 60-70%</text>
  
  <!-- Wall A: Main Background (Glass) -->
  <g transform="translate(80, 290)">
    <!-- Glass Panel -->
    <rect width="540" height="720" fill="url(#glass-gradient)" stroke="#b0bec5" stroke-width="3"/>
    
    <!-- Backlit Logo (Acrylic) -->
    <g filter="url(#logo-glow)">
      <circle cx="270" cy="360" r="180" fill="#e3f2fd" opacity="0.95"/>
      
      <!-- Abstract Globe -->
      <path d="M 90 360 Q 270 240, 450 360 T 90 480 Z" fill="#2196f3" opacity="0.85"/>
      <ellipse cx="270" cy="270" rx="180" ry="80" fill="#bbdefb" opacity="0.6"/>
      <ellipse cx="270" cy="450" rx="180" ry="80" fill="#90caf9" opacity="0.6"/>
      
      <!-- Chinese Characters -->
      <text x="140" y="385" font-family="'KaiTi', serif" font-size="72" letter-spacing="8" fill="#fff">翰</text>
      <text x="390" y="385" font-family="'KaiTi', serif" font-size="72" letter-spacing="8" fill="#fff">林</text>
      
      <!-- Glow Effect -->
      <circle cx="270" cy="360" r="140" fill="#ffeb3b" opacity="0.15"/>
    </g>
    
    <!-- Subtitle (Acrylic) -->
    <rect x="180" y="540" width="180" height="40" rx="5" fill="#fff" stroke="#e0e0e0" opacity="0.7"/>
    <text x="270" y="575" font-family="'Microsoft YaHei', sans-serif" font-size="16" text-anchor="middle" fill="#333">一家专注于国际教育咨询的专业机构</text>
    
    <!-- Glass Reflection -->
    <line x1="80" y1="290" x2="80" y2="1010" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Wall B: Case Studies (Glass) -->
  <g transform="translate(640, 290)">
    <!-- Glass Panel -->
    <rect width="680" height="720" fill="url(#glass-gradient)" stroke="#b0bec5" stroke-width="3"/>
    
    <!-- Title -->
    <text x="40" y="120" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">留学生成功案例</text>
    
    <!-- Case Card 1 -->
    <g transform="translate(50, 160)">
      <rect width="280" height="240" rx="12" fill="#fff" stroke="#e0e0e0" opacity="0.9"/>
      
      <!-- Student Photo (placeholder) -->
      <circle cx="140" cy="65" r="40" fill="#cfd8dc" stroke="#90a4ae" stroke-width="2"/>
      <text x="140" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="16" text-anchor="middle" fill="#666">学生照片</text>
      
      <!-- Country Flag -->
      <rect x="230" y="80" width="40" height="25" rx="3"/>
      <circle cx="250" cy="92.5" r="12.5" fill="#ffeb3b" opacity="0.7"/>
      
      <!-- Text -->
      <text x="40" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#333">英国 G5 名校</text>
      <text x="40" y="165" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">申请人：张同学</text>
      <text x="40" y="190" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#888">GPA 3.7 → Cambridge</text>
    </g>
    
    <!-- Case Card 2 -->
    <g transform="translate(340, 160)">
      <rect width="280" height="240" rx="12" fill="#fff" stroke="#e0e0e0" opacity="0.9"/>
      
      <!-- Student Photo -->
      <circle cx="140" cy="65" r="40" fill="#cfd8dc" stroke="#90a4ae" stroke-width="2"/>
      <text x="140" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="16" text-anchor="middle" fill="#666">学生照片</text>
      
      <!-- Country Flag -->
      <rect x="230" y="80" width="40" height="25" rx="3"/>
      <circle cx="250" cy="92.5" r="12.5" fill="#ffeb3b" opacity="0.7"/>
      
      <!-- Text -->
      <text x="40" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#333">美国常春藤</text>
      <text x="40" y="165" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">申请人：李同学</text>
      <text x="40" y="190" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#888">背景提升 → Harvard</text>
    </g>
    
    <!-- School Logos Section -->
    <rect x="50" y="420" width="600" height="300" rx="8"/>
    <text x="80" y="460" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#333">合作院校 Logo 墙</text>
    
    <!-- Sample School Logos -->
    <g transform="translate(70, 480)">
      <rect width="120" height="60" rx="5" fill="#fff" stroke="#e0e0e0"/>
      <circle cx="100" cy="35" r="10" fill="#90a4ae" opacity="0.5"/>
      <text x="20" y="55" font-family="'Microsoft YaHei', sans-serif" font-size="12">UK</text>
    </g>
    
    <g transform="translate(220, 480)">
      <rect width="120" height="60" rx="5" fill="#fff" stroke="#e0e0e0"/>
      <circle cx="100" cy="35" r="10" fill="#90a4ae" opacity="0.5"/>
      <text x="20" y="55" font-family="'Microsoft YaHei', sans-serif" font-size="12">USA</text>
    </g>
    
    <g transform="translate(370, 480)">
      <rect width="120" height="60" rx="5" fill="#fff" stroke="#e0e0e0"/>
      <circle cx="100" cy="35" r="10" fill="#90a4ae" opacity="0.5"/>
      <text x="20" y="55" font-family="'Microsoft YaHei', sans-serif" font-size="12">EU</text>
    </g>
    
    <!-- Backlighting Indication -->
    <rect width="680" height="720" fill="#ffffff" opacity="0.03"/>
  </g>
  
  <!-- Wall C: Philosophy + Services (Glass) -->
  <g transform="translate(1340, 290)">
    <!-- Glass Panel -->
    <rect width="540" height="720" fill="url(#glass-gradient)" stroke="#b0bec5" stroke-width="3"/>
    
    <!-- Philosophy Section -->
    <g transform="translate(50, 100)">
      <text x="60" y="120" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#f57c00">我们的留学理念</text>
      
      <!-- Quote Style Border -->
      <line x1="60" y1="145" x2="490" y2="145" stroke="#ffa000" stroke-width="1"/>
      <path d="M 480 145 Q 500 135, 520 155 T 600 145" fill="none" stroke="#ffa000" stroke-width="1"/>
      
      <!-- Text -->
      <text x="70" y="180" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">以学员为中心，</text>
      <text x="70" y="205" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">个性化定制方案</text>
      
      <!-- Decorative Element -->
      <circle cx="80" cy="230" r="8" fill="#ff9800" opacity="0.6"/>
    </g>
    
    <!-- Philosophy Section -->
    <g transform="translate(50, 100)">
      <text x="60" y="120" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#f57c00">我们的留学理念</text>
      
      <!-- Quote Style Border -->
      <line x1="60" y1="145" x2="490" y2="145" stroke="#ffa000" stroke-width="1"/>
      <path d="M 480 145 Q 500 135, 520 155 T 600 145" fill="none" stroke="#ffa000" stroke-width="1"/>
      
      <!-- Core Philosophy -->
      <text x="70" y="180" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">教育不是越早出国越好，</text>
      <text x="70" y="205" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">而是越合适越好</text>
      
      <!-- Decorative Element -->
      <circle cx="80" cy="230" r="8" fill="#ff9800" opacity="0.6"/>
    </g>
    
    <!-- Services Section -->
    <g transform="translate(50, 210)">
      <text x="60" y="35" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#f57c00">业务范围</text>
      
      <!-- Service Category 1: Academic Programs -->
      <rect x="60" y="60" width="460" height="60" rx="8" fill="#fff" stroke="#e0e0e0" opacity="0.9"/>
      <text x="75" y="92" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#333">学历教育项目</text>
      <text x="75" y="115" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">初中 • 高中 • 大学预科</text>
      
      <!-- Service Category 2: Experience Programs -->
      <rect x="60" y="135" width="460" height="60" rx="8" fill="#fff" stroke="#e0e0e0" opacity="0.9"/>
      <text x="75" y="167" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#333">体验项目</text>
      <text x="75" y="190" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">短期插班 • 国际课程体验营</text>
      
      <!-- Service Category 3: Academic Planning -->
      <rect x="60" y="215" width="460" height="60" rx="8" fill="#fff" stroke="#e0e0e0" opacity="0.9"/>
      <text x="75" y="247" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#333">国际升学就业规划</text>
      <text x="75" y="270" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">全周期服务支持</text>
    </g>
    
    <!-- Backlighting Indication -->
    <rect width="540" height="720" fill="#ffffff" opacity="0.03"/>
  </g>
  
  <!-- Legend -->
  <rect x="60" y="1020" width="1280" height="120" fill="#fff3e0" rx="8"/>
  <text x="80" y="1055" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#f57c00">效果说明：</text>
  <text x="80" y="1080" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 半透明玻璃营造现代感与通透性</text>
  <text x="80" y="1105" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 背光 Logo 形成柔和光晕效果</text>
  <text x="80" y="1130" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 文字内容清晰可读，远距离也能识别</text>
  
  <!-- Material Specifications -->
  <rect x="60" y="1150" width="1280" height="70"/>
  <text x="80" y="1180" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 玻璃：双层夹胶钢化，总厚度约 18-20mm</text>
  <text x="80" y="1205" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• Logo/文字：背发光亚克力板（PC+PMMA）</text>
  <text x="80" y="1230" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• LED 灯带：SMD2835，色温 3200K，显色指数 Ra≥90</text>
  
</svg>
