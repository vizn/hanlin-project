<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="1200" fill="#f5f7fa"/>
  
  <!-- Title Section -->
  <text x="60" y="60" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a1a1a">墙面设计方案（玻璃 + 普通墙面混合）</text>
  <line x1="60" y1="95" x2="1340" y2="95" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Material Legend -->
  <rect x="60" y="110" width="1280" height="70" fill="#fff3e0" rx="8"/>
  <text x="80" y="145" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16" font-weight="bold" fill="#f57c00">材质说明：</text>
  <g transform="translate(80, 160)">
    <rect width="200" height="40" rx="5" fill="#e3f2fd" stroke="#2196f3"/>
    <text x="220" y="32" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">玻璃墙面（墙面 A）</text>
    
    <rect width="200" height="40" rx="5" fill="#ffffff" stroke="#9e9e9e"/>
    <text x="440" y="32" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">普通白色墙面（墙面 B/C）</text>
  </g>
  
  <!-- Wall A: Main Background (Glass) -->
  <g transform="translate(80, 290)">
    <!-- Glass Panel with Gradient -->
    <defs>
      <linearGradient id="glass-a" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:rgba(255,255,255,0.9);"/>
        <stop offset="50%" style="stop-color:rgba(240,245,255,0.7);"/>
        <stop offset="100%" style="stop-color:rgba(230,235,250,0.9);"/>
      </linearGradient>
    </defs>
    
    <!-- Glass Backdrop -->
    <rect width="540" height="720" fill="url(#glass-a)" stroke="#b0bec5" stroke-width="3"/>
    
    <!-- Logo (Acrylic with Backlight) -->
    <g filter="url(#logo-glow)">
      <circle cx="270" cy="360" r="180" fill="#e3f2fd" opacity="0.95"/>
      
      <!-- Abstract Globe Icon -->
      <path d="M 90 360 Q 270 240, 450 360 T 90 480 Z" fill="#2196f3" opacity="0.85"/>
      <ellipse cx="270" cy="270" rx="180" ry="80" fill="#bbdefb" opacity="0.6"/>
      <ellipse cx="270" cy="450" rx="180" ry="80" fill="#90caf9" opacity="0.6"/>
      
      <!-- Chinese Characters -->
      <text x="140" y="385" font-family="'KaiTi', serif" font-size="72" letter-spacing="8" fill="#fff">翰林</text>
      <text x="390" y="385" font-family="'KaiTi', serif" font-size="72" letter-spacing="8" fill="#fff">光年</text>
      
      <!-- Glow Effect -->
      <circle cx="270" cy="360" r="140" fill="#ffeb3b" opacity="0.15"/>
    </g>
    
    <!-- Subtitle (Acrylic) -->
    <rect x="180" y="540" width="180" height="40" rx="5" fill="#fff" stroke="#e0e0e0" opacity="0.7"/>
    <text x="270" y="575" font-family="'Microsoft YaHei', sans-serif" font-size="16" text-anchor="middle" fill="#333">一家专注于国际教育咨询的专业机构</text>
    
    <!-- Glass Reflection Lines -->
    <line x1="80" y1="290" x2="80" y2="1010" stroke="white" stroke-width="2" opacity="0.3"/>
    <path d="M 140 295 L 130 1005 M 500 305 L 490 995" stroke="white" stroke-width="1" opacity="0.2"/>
    
    <!-- Wall A Label -->
    <text x="80" y="1040" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#333">墙面 A（主背景墙）</text>
    <text x="80" y="1065" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">材质：双层夹胶钢化玻璃 + 背发光亚克力 Logo</text>
    <text x="80" y="1090" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">尺寸：240cm × 300cm | 面积：72㎡</text>
  </g>
  
  <!-- Wall B: Case Studies (Ordinary White Wall) -->
  <g transform="translate(640, 290)">
    <!-- White Wall Panel -->
    <rect width="680" height="720" fill="#ffffff" stroke="#d3d3d3"/>
    
    <!-- Title Section -->
    <text x="50" y="110" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#333">留学生成功案例展示</text>
    
    <!-- Case Card 1 -->
    <g transform="translate(60, 150)">
      <rect width="280" height="240" rx="12" fill="#f9f9f9" stroke="#e0e0e0"/>
      
      <!-- Student Photo Placeholder -->
      <circle cx="140" cy="65" r="40" fill="#cfd8dc" stroke="#90a4ae" stroke-width="2"/>
      <text x="140" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="16" text-anchor="middle" fill="#666">学生照片</text>
      
      <!-- Country Flag -->
      <rect x="230" y="80" width="40" height="25" rx="3"/>
      <circle cx="250" cy="92.5" r="12.5" fill="#ffeb3b" opacity="0.7"/>
      
      <!-- Text -->
      <text x="60" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#333">英国 G5 名校</text>
      <text x="60" y="165" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">申请人：张同学</text>
      <text x="60" y="190" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#888">GPA 3.7 → Cambridge</text>
    </g>
    
    <!-- Case Card 2 -->
    <g transform="translate(350, 150)">
      <rect width="280" height="240" rx="12" fill="#f9f9f9" stroke="#e0e0e0"/>
      
      <!-- Student Photo -->
      <circle cx="140" cy="65" r="40" fill="#cfd8dc" stroke="#90a4ae" stroke-width="2"/>
      <text x="140" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="16" text-anchor="middle" fill="#666">学生照片</text>
      
      <!-- Country Flag -->
      <rect x="230" y="80" width="40" height="25" rx="3"/>
      <circle cx="250" cy="92.5" r="12.5" fill="#ffeb3b" opacity="0.7"/>
      
      <!-- Text -->
      <text x="60" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#333">美国常春藤</text>
      <text x="60" y="165" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">申请人：李同学</text>
      <text x="60" y="190" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#888">背景提升 → Harvard</text>
    </g>
    
    <!-- School Section (China Academy) -->
    <rect x="50" y="420" width="600" height="300" rx="8"/>
    <text x="70" y="460" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#333">合作院校：中华书院</text>
    
    <!-- School Logo -->
    <g transform="translate(90, 480)">
      <rect width="120" height="60" rx="5" fill="#fff" stroke="#e0e0e0"/>
      <circle cx="100" cy="35" r="10" fill="#90a4ae" opacity="0.5"/>
      <text x="20" y="55" font-family="'Microsoft YaHei', sans-serif" font-size="12">PPCHA</text>
    </g>
    
    <!-- School Description -->
    <rect x="90" y="480" width="460" height="230"/>
    <line x1="90" y1="500" x2="550" y2="500" stroke="#e0e0e0"/>
    
    <text x="100" y="520" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">Philippine Pasay Chung Hua Academy</text>
    <text x="100" y="545" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#666">菲律宾帕赛中华书院</text>
    
    <!-- Key Features -->
    <line x1="90" y1="570" x2="550" y2="570" stroke="#e0e0e0"/>
    <text x="100" y="600" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 私立非营利教育机构 •89 年办学历史</text>
    <text x="100" y="625" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 中文特色项目 •计算机教育 •全人教育理念</text>
    
    <!-- Education Levels -->
    <line x1="90" y1="650" x2="550" y2="650" stroke="#e0e0e0"/>
    <text x="100" y="675" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">教育阶段：学前教育→小学→中学（K-12）</text>
    
    <!-- Wall B Label -->
    <text x="640" y="1040" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#333">墙面 B（案例区）</text>
    <text x="640" y="1065" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">材质：普通白色墙面 + 喷绘背景板</text>
    <text x="640" y="1090" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">尺寸：240cm × 600cm | 面积：144㎡</text>
  </g>
  
  <!-- Wall C: Philosophy + Services (Ordinary White Wall) -->
  <g transform="translate(1320, 290)">
    <!-- White Wall Panel -->
    <rect width="540" height="720" fill="#ffffff" stroke="#d3d3d3"/>
    
    <!-- Philosophy Section -->
    <g transform="translate(50, 100)">
      <text x="60" y="120" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#f57c00">我们的留学理念</text>
      
      <!-- Quote Style Border -->
      <line x1="60" y1="145" x2="490" y2="145" stroke="#ffa000" stroke-width="1"/>
      <path d="M 480 145 Q 500 135, 520 155 T 600 145" fill="none" stroke="#ffa000" stroke-width="1"/>
      
      <!-- Text -->
      <text x="70" y="180" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">教育不是越早出国越好，</text>
      <text x="70" y="205" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">而是越合适越好</text>
      
      <!-- Decorative Element -->
      <circle cx="80" cy="230" r="8" fill="#ff9800" opacity="0.6"/>
    </g>
    
    <!-- Core Values -->
    <g transform="translate(50, 240)">
      <rect x="70" y="10" width="440" height="70" rx="8" fill="#fff3e0" stroke="#ffe0b2"/>
      <text x="85" y="42" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#f57c00">降低试错成本</text>
      <text x="85" y="65" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#666">先体验→再观察→再决定</text>
    </g>
    
    <!-- Services Section -->
    <g transform="translate(50, 340)">
      <text x="60" y="70" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#f57c00">业务范围</text>
      
      <!-- Service Category 1 -->
      <rect x="60" y="95" width="460" height="60" rx="8" fill="#fff" stroke="#e0e0e0"/>
      <text x="75" y="127" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#333">学历教育项目</text>
      <text x="75" y="148" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">初中 • 高中 • 大学预科</text>
      
      <!-- Service Category 2 -->
      <rect x="60" y="170" width="460" height="60" rx="8" fill="#fff" stroke="#e0e0e0"/>
      <text x="75" y="202" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#333">体验项目</text>
      <text x="75" y="223" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">短期插班 • 国际课程体验营</text>
      
      <!-- Service Category 3 -->
      <rect x="60" y="245" width="460" height="60" rx="8" fill="#fff" stroke="#e0e0e0"/>
      <text x="75" y="277" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#333">升学规划服务</text>
      <text x="75" y="298" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">全周期支持 • 衔接建议 • 路径设计</text>
    </g>
    
    <!-- Wall C Label -->
    <text x="1320" y="1040" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#333">墙面 C（理念区）</text>
    <text x="1320" y="1065" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">材质：普通白色墙面 + 喷绘背景板</text>
    <text x="1320" y="1090" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#666">尺寸：240cm × 600cm | 面积：144㎡</text>
  </g>
  
  <!-- Overall Summary -->
  <rect x="60" y="1020" width="1280" height="120"/>
  <text x="80" y="1055" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#333">📋 方案总结：</text>
  
  <line x1="60" y1="1075" x2="1340" y2="1075" stroke="#e0e0e0"/>
  
  <!-- Material Summary -->
  <g transform="translate(80, 1090)">
    <text x="0" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 墙面 A（Logo 区）：双层夹胶钢化玻璃 + 背发光亚克力</text>
    <text x="0" y="25" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">  • 营造现代感与通透性，视觉焦点突出</text>
    
    <rect width="60" height="4" rx="2" fill="#9e9e9e"/>
    <text x="75" y="47" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 墙面 B（案例区）：普通白色墙面 + 喷绘背景板</text>
    <text x="0" y="62" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">  • 适合展示图文内容，成本较低</text>
    
    <rect width="60" height="4" rx="2" fill="#9e9e9e"/>
    <text x="75" y="87" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 墙面 C（理念区）：普通白色墙面 + 喷绘背景板</text>
    <text x="0" y="102" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">  • 文字清晰可读，便于信息传达</text>
    
    <rect width="60" height="4" rx="2" fill="#9e9e9e"/>
    <text x="75" y="127" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">• 总墙面面积：A(72㎡) + B(144㎡) + C(144㎡) = 360㎡</text>
    <text x="75" y="142" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#333">  • 灯光统一采用 LED 灯带，色温 3200K（暖白光）</text>
  </g>
  
</svg>
